<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMARTGrade Planner</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6fb;margin:0;padding:15px;}
.container{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;color:#4b5bdc;}
input[type=text]{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#f3f4f7;}
.totalbox{margin-top:15px;font-weight:bold;font-size:16px;}
.correct{background-color:#c8e6c9;}
.wrong{background-color:#ffcdd2;}
button{padding:10px 15px;background:#4b5bdc;color:white;border:none;border-radius:6px;cursor:pointer;margin:5px 0;}
@media(max-width:600px){td,th,input,button{font-size:12px;padding:5px;}}
</style>
</head>
<body>

<div class="container">
<h2>SMARTGrade Planner System</h2>

<label>Student ID</label>
<input type="text" id="studentID" placeholder="Enter Student ID here...">
<button onclick="loadStudent()">Load Student</button>
<button onclick="saveTarget()">Save Target</button>
<button onclick="clearAll()">Clear</button>

<p><b>Name:</b> <span id="name">-</span></p>
<p><b>Class:</b> <span id="class">-</span></p>

<table>
<tr>
<th>Assessment</th><th>Max</th><th>Weight</th><th>Target</th><th>Target %</th><th>Actual</th><th>Actual %</th>
</tr>
<tr><td id="assess1"></td><td id="maxA1"></td><td id="weightA1"></td><td><input id="targetA1" oninput="calcTarget()"></td><td id="targetPctA1"></td><td id="actualA1"></td><td id="actualPctA1"></td></tr>
<tr><td id="assess2"></td><td id="maxA2"></td><td id="weightA2"></td><td><input id="targetA2" oninput="calcTarget()"></td><td id="targetPctA2"></td><td id="actualA2"></td><td id="actualPctA2"></td></tr>
<tr><td id="assess3"></td><td id="maxA3"></td><td id="weightA3"></td><td><input id="targetA3" oninput="calcTarget()"></td><td id="targetPctA3"></td><td id="actualA3"></td><td id="actualPctA3"></td></tr>
<tr><td id="assess4"></td><td id="maxA4"></td><td id="weightA4"></td><td><input id="targetA4" oninput="calcTarget()"></td><td id="targetPctA4"></td><td id="actualA4"></td><td id="actualPctA4"></td></tr>
</table>

<div class="totalbox">Total Target Marks: <span id="totalTarget">0</span></div>
<div class="totalbox">Target Final %: <span id="targetFinalPct">0</span>%</div>
<div class="totalbox">Total Actual Marks: <span id="totalActual">0</span></div>
<div class="totalbox">Final %: <span id="finalPercent">0</span>%</div>
<div class="totalbox">Predicted Grade: <span id="finalGrade">-</span></div>
<div class="totalbox">Risk Level: <span id="riskLevel">-</span></div>
<div class="totalbox">PBPA Status: <span id="pbpaStatus">-</span></div>
<div class="totalbox">Fail Probability Prediction: <span id="failProb">0%</span></div>

</div>

<script>
var url="https://script.google.com/macros/s/AKfycbzs01_kL-acDTFlDjRqXbLhzS_NCX3Tm4djmeu5gK1YnZ80EoyvQiTuBG4X455glhTbLw/exec";

function getGrade(p){
  if(p>=90) return "A+";
  if(p>=80) return "A";
  if(p>=75) return "A-";
  if(p>=70) return "B+";
  if(p>=65) return "B";
  if(p>=60) return "B-";
  if(p>=55) return "C+";
  if(p>=50) return "C";
  if(p>=45) return "C-";
  return "F";
}

function detectRisk(p){
  if(p>=70) document.getElementById("riskLevel").innerText="SAFE";
  else if(p>=50) document.getElementById("riskLevel").innerText="MODERATE RISK";
  else document.getElementById("riskLevel").innerText="HIGH RISK";
}

function calcTarget(){
  let totalTarget=0,totalTargetMax=0;
  for(let i=1;i<=4;i++){
    let target=parseFloat(document.getElementById("targetA"+i).value)||0;
    let max=parseFloat(document.getElementById("maxA"+i).innerText)||0;
    let weight=parseFloat(document.getElementById("weightA"+i).innerText)||0;
    let pct=(target/max)*weight;
    document.getElementById("targetPctA"+i).innerText=pct.toFixed(2);
    totalTarget+=target;
    if(target>0) totalTargetMax+=max;
  }
  document.getElementById("totalTarget").innerText=totalTarget.toFixed(2);
  let targetFinal=(totalTargetMax>0)?(totalTarget/totalTargetMax*100):0;
  document.getElementById("targetFinalPct").innerText=targetFinal.toFixed(2);

  calcActual(); // auto update actual % & grade
}

function calcActual(){
  let totalActual=0,totalActualMax=0;
  let totalPctSum=0;

  for(let i=1;i<=4;i++){
    let actual=parseFloat(document.getElementById("actualA"+i).innerText)||0;
    let target=parseFloat(document.getElementById("targetA"+i).value)||0;
    let max=parseFloat(document.getElementById("maxA"+i).innerText)||0;
    let weight=parseFloat(document.getElementById("weightA"+i).innerText)||0;

    let pct=(actual/max)*weight;
    document.getElementById("actualPctA"+i).innerText=pct.toFixed(2);

    // auto color indicator
    if(actual >= target) document.getElementById("actualA"+i).parentNode.className="correct";
    else document.getElementById("actualA"+i).parentNode.className="wrong";

    totalActual+=actual;
    if(actual>0) totalActualMax+=max;
  }

  document.getElementById("totalActual").innerText=totalActual;

  let finalPercent=(totalActualMax>0)?(totalActual/totalActualMax*100):0;
  document.getElementById("finalPercent").innerText=finalPercent.toFixed(2);

  document.getElementById("finalGrade").innerText=getGrade(finalPercent);
  detectRisk(finalPercent);

  // PBPA Status 45% of total max (all assignments)
  let allMax=0;
  for(let i=1;i<=4;i++) allMax+=parseFloat(document.getElementById("maxA"+i).innerText)||0;
  let passMark=0.45*allMax;
  if(totalActual>=passMark){
    document.getElementById("pbpaStatus").innerText="PASS PBPA - TOTAL ACTUAL MARK >= "+passMark.toFixed(2);
    document.getElementById("pbpaStatus").style.color="green";
  } else {
    document.getElementById("pbpaStatus").innerText="FAIL PBPA - TOTAL ACTUAL MARK < "+passMark.toFixed(2);
    document.getElementById("pbpaStatus").style.color="red";
  }

  // Fail Probability Prediction
  let failProb=Math.max(0,45-finalPercent); // if finalPercent<45, shows % to pass
  document.getElementById("failProb").innerText=failProb.toFixed(2)+"%";
}

function loadStudent(){
  let id=document.getElementById("studentID").value;
  fetch(url+"?id="+id)
    .then(res=>res.json())
    .then(data=>{
      if(data.length==0){
        alert("ID not found");
        for(let i=1;i<=4;i++){
          document.getElementById("assess"+i).innerText="-";
          document.getElementById("maxA"+i).innerText="0";
          document.getElementById("weightA"+i).innerText="0";
          document.getElementById("targetA"+i).value=0;
          document.getElementById("actualA"+i).innerText=0;
          document.getElementById("targetPctA"+i).innerText=0;
          document.getElementById("actualPctA"+i).innerText=0;
        }
        calcTarget();
        return;
      }

      document.getElementById("class").innerText=data[0];
      document.getElementById("name").innerText=data[2];

      let assess=[3,8,13,18];
      let max=[5,10,15,20];
      let weight=[6,11,16,21];
      let actual=[7,12,17,22];
      let target=[4,9,14,19];

      for(let i=1;i<=4;i++){
        document.getElementById("assess"+i).innerText=data[assess[i-1]];
        document.getElementById("maxA"+i).innerText=data[max[i-1]];
        document.getElementById("weightA"+i).innerText=data[weight[i-1]];
        document.getElementById("actualA"+i).innerText=data[actual[i-1]];
        document.getElementById("targetA"+i).value=data[target[i-1]];
      }

      calcTarget();
    });
}

function saveTarget(){
  let payload={
    id:document.getElementById("studentID").value,
    targetA1:document.getElementById("targetA1").value,
    targetA2:document.getElementById("targetA2").value,
    targetA3:document.getElementById("targetA3").value,
    targetA4:document.getElementById("targetA4").value
  };
  fetch(url,{method:"POST",body:JSON.stringify(payload)});
}

function clearAll(){location.reload();}
</script>

</body>
</html>
