<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMARTGrade Planner - Mobile Friendly</title>
<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#f0f2f7;
  margin:0;padding:0;
}
header{
  background:linear-gradient(135deg,#5f6bdc,#8b5bbf);
  color:white;
  padding:20px;
  text-align:center;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
header h1{margin:0;font-size:1.6em;}
.container{
  max-width:1000px;
  margin:20px auto;
  background:white;
  border-radius:15px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  overflow-x:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
  font-size:0.9em;
}
th{
  background:#f3f4f7;
  font-weight:600;
}
input{
  width:70px;
  padding:5px;
  border-radius:5px;
  border:1px solid #ccc;
}
button{
  padding:10px 16px;
  margin:5px 2px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,#5f6bdc,#8b5bbf);
  color:white;
  font-weight:600;
  transition:0.3s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.totalbox{
  margin-top:10px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.correct{background-color:#c8e6c9;font-weight:bold;}
.wrong{background-color:#ffcdd2;font-weight:bold;}
.progress-bar{
  height:20px;
  border-radius:10px;
  background-color:#eee;
  overflow:hidden;
  margin-top:5px;
}
.progress-bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#5f6bdc,#8b5bbf);
  text-align:center;
  color:white;
  font-weight:bold;
  transition:width 0.5s ease;
}
@media(max-width:600px){
  th,td,input,button{font-size:0.8em;padding:6px;}
  header h1{font-size:1.3em;}
  .totalbox{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<header>
  <h1>SMARTGrade Planner</h1>
  <p>Student Target vs Actual Assessment Analyzer</p>
</header>
<div class="container">
<h2>Student Planner</h2>
<label>Student ID: </label><input id="studentID">
<button onclick="loadStudent()">Load</button>
<button onclick="saveTarget()">Save</button>
<button onclick="clearAll()">Clear</button>

<p>Name: <span id="name"></span></p>
<p>Class: <span id="class"></span></p>

<table>
<tr><th>Assessment</th><th>Max</th><th>Weight</th><th>Target</th><th>Target %</th><th>Actual</th><th>Actual %</th></tr>
<tr><td id="assess1"></td><td id="maxA1"></td><td id="weightA1"></td><td><input id="targetA1" oninput="calcAll()"></td><td id="targetPctA1"></td><td id="actualA1"></td><td id="actualPctA1"></td></tr>
<tr><td id="assess2"></td><td id="maxA2"></td><td id="weightA2"></td><td><input id="targetA2" oninput="calcAll()"></td><td id="targetPctA2"></td><td id="actualA2"></td><td id="actualPctA2"></td></tr>
<tr><td id="assess3"></td><td id="maxA3"></td><td id="weightA3"></td><td><input id="targetA3" oninput="calcAll()"></td><td id="targetPctA3"></td><td id="actualA3"></td><td id="actualPctA3"></td></tr>
<tr><td id="assess4"></td><td id="maxA4"></td><td id="weightA4"></td><td><input id="targetA4" oninput="calcAll()"></td><td id="targetPctA4"></td><td id="actualA4"></td><td id="actualPctA4"></td></tr>
</table>

<div class="totalbox"><span>Total Target Marks: <span id="totalTarget">0</span></span>
<span>Total Actual Marks: <span id="totalActual">0</span></span>
<span>Final %: <span id="finalPercent">0</span>%</span></div>

<div class="totalbox">Predicted Grade: <span id="finalGrade">-</span></div>
<div class="totalbox">Risk Level: <span id="riskLevel">-</span></div>
<div class="totalbox">PBPA Status: <span id="pbpaStatus">-</span></div>
<div class="totalbox">Pass Probability Prediction:
<div class="progress-bar"><div id="failProbBar" class="progress-bar-fill">-</div></div></div>
</div>

<script>
var url="https://script.google.com/macros/s/AKfycbxLBKTdLyAV5QCSTRrhaH-95iLzxkrVbWPho7GgphWTE9wqdDW0LPk2URLTOXsNLa4v/exec";

function getGrade(p){
  if(p>=90) return "A+";
  if(p>=80) return "A";
  if(p>=75) return "A-";
  if(p>=70) return "B+";
  if(p>=65) return "B";
  if(p>=60) return "B-";
  if(p>=55) return "C+";
  if(p>=50) return "C";
  if(p>=45) return "C-";
  return "F";
}

function detectRisk(p){
  if(p>=70) document.getElementById("riskLevel").innerText="SAFE";
  else if(p>=50) document.getElementById("riskLevel").innerText="MODERATE RISK";
  else document.getElementById("riskLevel").innerText="HIGH RISK";
}

function calcAll(){
  let totalActual=0, totalMaxAll=0, totalTarget=0;

  for(let i=1;i<=4;i++){
    let target=parseFloat(document.getElementById("targetA"+i).value)||0;
    let max=parseFloat(document.getElementById("maxA"+i).innerText)||0;
    let weight=parseFloat(document.getElementById("weightA"+i).innerText)||0;
    let actual=parseFloat(document.getElementById("actualA"+i).innerText)||0;

    // Target %
    let targetPct=(target/max)*weight||0;
    document.getElementById("targetPctA"+i).innerText=targetPct.toFixed(2);

    // Actual %
    let actualPct=(actual/max)*weight||0;
    document.getElementById("actualPctA"+i).innerText=actualPct.toFixed(2);

    // Colour indicator
    if(actualPct>=targetPct) document.getElementById("actualPctA"+i).parentElement.className="correct";
    else document.getElementById("actualPctA"+i).parentElement.className="wrong";

    // Summations
    totalTarget+=target;
    totalActual+=actual;
    totalMaxAll+=max; // SUM ALL max, regardless of actual value
  }

  document.getElementById("totalTarget").innerText=totalTarget.toFixed(2);
  document.getElementById("totalActual").innerText=totalActual.toFixed(2);

  // Final %
  let filledMax=0;
  for(let i=1;i<=4;i++){
    let actual=parseFloat(document.getElementById("actualA"+i).innerText)||0;
    let max=parseFloat(document.getElementById("maxA"+i).innerText)||0;
    if(actual>0) filledMax+=max;
  }
  let finalPercent=(filledMax>0)?(totalActual/filledMax)*100:0;
  document.getElementById("finalPercent").innerText=finalPercent.toFixed(2);

  // Predicted Grade & Risk
  document.getElementById("finalGrade").innerText=getGrade(finalPercent);
  detectRisk(finalPercent);

  // PBPA Status -> 45% of TOTAL MAX ALL
  let passMark = 0.45 * totalMaxAll;
  if(totalActual >= passMark){
    document.getElementById("pbpaStatus").innerText="PASS PBPA - TOTAL ACTUAL MARK >= "+passMark.toFixed(2);
    document.getElementById("pbpaStatus").style.color="green";
  }else{
    document.getElementById("pbpaStatus").innerText="FAIL PBPA - TOTAL ACTUAL MARK < "+passMark.toFixed(2);
    document.getElementById("pbpaStatus").style.color="red";
  }

  // Pass probability
  let passProb = (passMark - totalActual)/passMark*100;
  passProb = Math.max(0,Math.min(100,passProb));
  document.getElementById("failProbBar").style.width = (100-passProb)+"%";
  document.getElementById("failProbBar").innerText = (100-passProb).toFixed(0)+"%";
}

function loadStudent(){
  let id=document.getElementById("studentID").value;
  fetch(url+"?id="+id)
    .then(res=>res.json())
    .then(data=>{
      if(data.length==0){alert("ID not found");return;}
      document.getElementById("class").innerText=data[0];
      document.getElementById("name").innerText=data[2];
      let assess=[3,8,13,18], max=[5,10,15,20], weight=[6,11,16,21], actual=[7,12,17,22], target=[4,9,14,19];
      for(let i=1;i<=4;i++){
        document.getElementById("assess"+i).innerText=data[assess[i-1]];
        document.getElementById("maxA"+i).innerText=data[max[i-1]];
        document.getElementById("weightA"+i).innerText=data[weight[i-1]];
        document.getElementById("actualA"+i).innerText=data[actual[i-1]];
        document.getElementById("targetA"+i).value=data[target[i-1]];
      }
      calcAll();
    });
}

function saveTarget(){
  let payload={
    id:document.getElementById("studentID").value,
    targetA1:document.getElementById("targetA1").value,
    targetA2:document.getElementById("targetA2").value,
    targetA3:document.getElementById("targetA3").value,
    targetA4:document.getElementById("targetA4").value
  };
  fetch(url,{method:"POST",body:JSON.stringify(payload)});
}

function clearAll(){location.reload();}
</script>
</body>
</html>
