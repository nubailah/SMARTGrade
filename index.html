<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Planner</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f7}
.header{background:#5f6bdc;color:white;padding:20px;text-align:center}
.card{background:white;margin:10px;padding:15px;border-radius:10px}
button{background:#5f6bdc;color:white;padding:10px;border:none;border-radius:6px}
input,select,textarea{width:100%;padding:8px;margin:5px 0}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
.nav button{margin:2px}
</style>
</head>

<body>

<div class="header">
<h2>SMART PLANNER SYSTEM</h2>
</div>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>LOGIN</h3>

<select id="role">
<option>STUDENT</option>
<option>LECTURER</option>
<option>ADVISOR</option>
</select>

<input id="id" placeholder="ID">
<input id="email" placeholder="Email">

<button onclick="login()">LOGIN</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="nav">
<button onclick="show('student')">Student</button>
<button onclick="show('lecturer')">Lecturer</button>
<button onclick="show('advisor')">Advisor</button>
</div>

<!-- STUDENT -->
<div id="studentTab" class="card">
<h3>STUDENT DASHBOARD</h3>
<input id="sid">
<button onclick="loadStudent()">Load</button>
<div id="studentData"></div>
</div>

<!-- LECTURER -->
<div id="lecturerTab" class="card" style="display:none">
<h3>LECTURER DASHBOARD</h3>

<input id="cls" placeholder="Class">
<input id="sub" placeholder="Subject">

<select id="ass">
<option>A1</option>
<option>A2</option>
<option>A3</option>
<option>A4</option>
</select>

<button onclick="loadLecturer()">Load</button>

<table id="lecTable"></table>
</div>

<!-- ADVISOR -->
<div id="advisorTab" class="card" style="display:none">
<h3>ADVISOR DASHBOARD</h3>
<button onclick="loadAdvisor()">Load Students</button>
<div id="advisorData"></div>
</div>

</div>

<script>

let user={};

// LOGIN
function login(){
  google.script.run.withSuccessHandler(res=>{

    if(res.status!="success"){
      alert("Login failed");return;
    }

    user=res;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    if(user.role=="STUDENT") show("student");
    if(user.role=="LECTURER") show("lecturer");
    if(user.role=="ADVISOR") show("advisor");

  }).login({
    role:role.value,
    id:id.value,
    email:email.value
  });
}

// NAV
function show(t){
  studentTab.style.display="none";
  lecturerTab.style.display="none";
  advisorTab.style.display="none";

  if(t=="student") studentTab.style.display="block";
  if(t=="lecturer") lecturerTab.style.display="block";
  if(t=="advisor") advisorTab.style.display="block";
}

// STUDENT
function loadStudent(){
  google.script.run.withSuccessHandler(r=>{
    studentData.innerHTML=JSON.stringify(r);
  }).getStudentData(sid.value);
}

// LECTURER
function loadLecturer(){
  google.script.run.withSuccessHandler(data=>{
    let t=document.getElementById("lecTable");

    t.innerHTML=`<tr><th>ID</th><th>Name</th><th>Target</th><th>Actual</th></tr>`;

    data.forEach(d=>{
      t.innerHTML+=`
      <tr>
        <td>${d.studentID}</td>
        <td>${d.studentName}</td>
        <td>${d.target}</td>
        <td>${d.actual}</td>
      </tr>`;
    });

  }).getLecturerData(cls.value,sub.value,ass.value);
}

// ADVISOR
function loadAdvisor(){
  google.script.run.withSuccessHandler(d=>{
    advisorData.innerHTML=JSON.stringify(d);
  }).getAdvisorData(user.name);
}

</script>

</body>
</html>
