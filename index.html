<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SMARTGrade Planner</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

input{
width:70px;
padding:5px;
}

button{
padding:10px 15px;
margin-top:10px;
}

.totalbox{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>SMARTGrade Student Planner</h2>

Student ID

<input id="studentID">

<button onclick="loadStudent()">Load</button>

<button onclick="saveTarget()">Save</button>

<button onclick="clearAll()">Clear</button>

<p>Name: <span id="name"></span></p>

<p>Class: <span id="class"></span></p>

<table>

<tr>
<th>Assessment</th>
<th>Max</th>
<th>Target</th>
<th>Target %</th>
<th>Actual</th>
<th>Actual %</th>
</tr>

<tr>
<td id="assess1"></td>
<td id="max1"></td>
<td><input id="target1" oninput="calcTarget()"></td>
<td id="targetPct1"></td>
<td id="actual1"></td>
<td id="actualPct1"></td>
</tr>

<tr>
<td id="assess2"></td>
<td id="max2"></td>
<td><input id="target2" oninput="calcTarget()"></td>
<td id="targetPct2"></td>
<td id="actual2"></td>
<td id="actualPct2"></td>
</tr>

<tr>
<td id="assess3"></td>
<td id="max3"></td>
<td><input id="target3" oninput="calcTarget()"></td>
<td id="targetPct3"></td>
<td id="actual3"></td>
<td id="actualPct3"></td>
</tr>

<tr>
<td id="assess4"></td>
<td id="max4"></td>
<td><input id="target4" oninput="calcTarget()"></td>
<td id="targetPct4"></td>
<td id="actual4"></td>
<td id="actualPct4"></td>
</tr>

</table>

<div class="totalbox">
Total Actual Marks: <span id="totalActual">0</span>
</div>

<div class="totalbox">
Final Percentage: <span id="finalPercent">0</span>%
</div>

<div class="totalbox">
Predicted Grade: <span id="finalGrade">-</span>
</div>

<div class="totalbox">
Risk Level: <span id="riskLevel">-</span>
</div>

<div class="totalbox">
PBPA Status: <span id="pbpaStatus">-</span>
</div>

</div>

<script>

var url="https://script.google.com/macros/s/AKfycbwYeABZKhid1AO4XLD8V2hGIfI2Tle79vasdDxgrK3vEcFyEHFD-1PSA-5GyZw6VFW9bg/exec";

function getGrade(p){

if(p>=90) return "A+";
if(p>=80) return "A";
if(p>=75) return "A-";
if(p>=70) return "B+";
if(p>=65) return "B";
if(p>=60) return "B-";
if(p>=55) return "C+";
if(p>=50) return "C";
if(p>=45) return "C-";
return "F";

}

function detectRisk(p){

if(p>=70){

document.getElementById("riskLevel").innerText="SAFE";

}

else if(p>=50){

document.getElementById("riskLevel").innerText="MODERATE RISK";

}

else{

document.getElementById("riskLevel").innerText="HIGH RISK";

}

}

function calcTarget(){

for(let i=1;i<=4;i++){

let target=parseFloat(document.getElementById("target"+i).value)||0;

let max=parseFloat(document.getElementById("max"+i).innerText)||1;

let pct=(target/max)*100;

document.getElementById("targetPct"+i).innerText=pct.toFixed(2);

}

calcActual();

}

function calcActual(){

let totalActual=0;
let totalMax=0;

for(let i=1;i<=4;i++){

let actual=parseFloat(document.getElementById("actual"+i).innerText);

let max=parseFloat(document.getElementById("max"+i).innerText);

if(!isNaN(actual) && actual>0){

let pct=(actual/max)*100;

document.getElementById("actualPct"+i).innerText=pct.toFixed(2);

totalActual+=actual;
totalMax+=max;

}

else{

document.getElementById("actualPct"+i).innerText="";

}

}

document.getElementById("totalActual").innerText=totalActual;

if(totalMax>0){

let finalPercent=(totalActual/totalMax)*100;

document.getElementById("finalPercent").innerText=finalPercent.toFixed(2);

document.getElementById("finalGrade").innerText=getGrade(finalPercent);

detectRisk(finalPercent);

checkPBPA(totalActual,totalMax);

}

}

function checkPBPA(actual,max){

let passmark=0.45*max;

let msg="";

if(actual>=passmark){

msg="PASS PBPA - TOTAL ACTUAL MARK >= "+passmark.toFixed(2);

document.getElementById("pbpaStatus").style.color="green";

}

else{

msg="FAIL PBPA - TOTAL ACTUAL MARK < "+passmark.toFixed(2);

document.getElementById("pbpaStatus").style.color="red";

}

document.getElementById("pbpaStatus").innerText=msg;

}

function loadStudent(){

let id=document.getElementById("studentID").value;

fetch(url+"?id="+id)

.then(res=>res.json())

.then(data=>{

if(data.length==0){

clearAll();

alert("ID not found");

return;

}

document.getElementById("class").innerText=data[0];
document.getElementById("name").innerText=data[2];

let assess=[3,7,11,15];
let target=[4,8,12,16];
let max=[5,9,13,17];
let actual=[6,10,14,18];

for(let i=1;i<=4;i++){

document.getElementById("assess"+i).innerText=data[assess[i-1]];
document.getElementById("max"+i).innerText=data[max[i-1]];
document.getElementById("actual"+i).innerText=data[actual[i-1]];
document.getElementById("target"+i).value=data[target[i-1]];

}

calcTarget();

});

}

function saveTarget(){

let payload={

id:document.getElementById("studentID").value,
target1:document.getElementById("target1").value,
target2:document.getElementById("target2").value,
target3:document.getElementById("target3").value,
target4:document.getElementById("target4").value

};

fetch(url,{
method:"POST",
body:JSON.stringify(payload)
});

}

function clearAll(){

location.reload();

}

</script>

</body>
</html>
