<!DOCTYPE html>
<html>
<head>
  <title>Student eProfile System</title>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginPage">
  <h2>LOGIN</h2>

  <select id="role">
    <option value="STUDENT">STUDENT</option>
    <option value="LECTURER">LECTURER</option>
    <option value="ADVISOR">ADVISOR</option>
  </select>

  <br><br>

  <input id="id" placeholder="ID / No Gaji">
  <br><br>

  <input id="email" placeholder="Email / IC">
  <br><br>

  <button onclick="login()">LOGIN</button>

  <p id="msg"></p>
</div>

<!-- ================= STUDENT DASHBOARD ================= -->
<div id="studentDash" style="display:none;">
  <h2>STUDENT ePROFILE</h2>

  <h3>📊 My Performance</h3>
  <div id="studentData">Loading...</div>

  <h3>👨‍🏫 Advisor Info</h3>
  <div>Advisor: (auto from system)</div>
</div>

<!-- ================= LECTURER DASHBOARD ================= -->
<div id="lecturerDash" style="display:none;">
  <h2>LECTURER PANEL</h2>

  <h3>📚 Manage Marks</h3>
  <button>Add Marks</button>
  <button>Update Marks</button>

  <h3>📊 Class Performance</h3>
  <div>Graph area (Chart.js nanti)</div>
</div>

<!-- ================= ADVISOR DASHBOARD ================= -->
<div id="advisorDash" style="display:none;">
  <h2>ADVISOR PANEL</h2>

  <h3>🎯 My Students</h3>
  <div id="advisorStudents">Loading...</div>

  <h3>⚠ Intervention</h3>
  <button>View At Risk Students</button>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzTLMbTJBJvvXFYlXmmsV5uHk71n8HQZFl7PuJRJQdveYXlSwAEyOQmIn-owvuXtWzi/exec";

function login(){

  let data = {
    action: "login",
    role: document.getElementById("role").value,
    id: document.getElementById("id").value,
    email: document.getElementById("email").value
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {

    if(res.status == "success"){

      document.getElementById("loginPage").style.display = "none";

      // hide all dashboards
      hideAll();

      // ROLE CONTROL DASHBOARD
      if(res.role == "STUDENT"){
        document.getElementById("studentDash").style.display = "block";
        loadStudentData(res.id);
      }

      if(res.role == "LECTURER"){
        document.getElementById("lecturerDash").style.display = "block";
      }

      if(res.role == "ADVISOR"){
        document.getElementById("advisorDash").style.display = "block";
        loadAdvisorStudents(res.id);
      }

    } else {
      document.getElementById("msg").innerHTML = "LOGIN FAILED";
    }

  });

}

function hideAll(){
  document.getElementById("studentDash").style.display = "none";
  document.getElementById("lecturerDash").style.display = "none";
  document.getElementById("advisorDash").style.display = "none";
}

// ================= OPTIONAL DATA LOAD =================

function loadStudentData(id){
  document.getElementById("studentData").innerHTML =
    "Loading student data for ID: " + id;
}

function loadAdvisorStudents(id){
  document.getElementById("advisorStudents").innerHTML =
    "Loading advisor students for: " + id;
}

</script>

</body>
</html>
