<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage">
  <h2>LOGIN SYSTEM</h2>

  <select id="role">
    <option value="STUDENT">STUDENT</option>
    <option value="LECTURER">LECTURER</option>
    <option value="ADVISOR">ADVISOR</option>
  </select>

  <br><br>

  <input id="id" placeholder="ID / No Gaji">
  <br><br>

  <input id="email" placeholder="Email / IC">
  <br><br>

  <button onclick="login()">LOGIN</button>

  <p id="msg"></p>
</div>

<!-- ================= DASHBOARD ================= -->

<div id="studentDash" style="display:none;">
  <h2>STUDENT DASHBOARD</h2>
  <p>Welcome Student</p>
</div>

<div id="lecturerDash" style="display:none;">
  <h2>LECTURER DASHBOARD</h2>
  <p>Welcome Lecturer</p>
</div>

<div id="advisorDash" style="display:none;">
  <h2>ADVISOR DASHBOARD</h2>
  <p>Welcome Advisor</p>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzTLMbTJBJvvXFYlXmmsV5uHk71n8HQZFl7PuJRJQdveYXlSwAEyOQmIn-owvuXtWzi/exec";

function login(){

  let data = {
    action: "login",
    role: document.getElementById("role").value,
    id: document.getElementById("id").value,
    email: document.getElementById("email").value
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {

    if(res.status == "success"){

      document.getElementById("msg").innerHTML = "";

      // 🔥 HIDE LOGIN PAGE
      document.getElementById("loginPage").style.display = "none";

      // 🔥 HIDE ALL DASHBOARD FIRST
      document.getElementById("studentDash").style.display = "none";
      document.getElementById("lecturerDash").style.display = "none";
      document.getElementById("advisorDash").style.display = "none";

      // 🔥 SHOW BY ROLE
      if(res.role == "STUDENT"){
        document.getElementById("studentDash").style.display = "block";
      }

      if(res.role == "LECTURER"){
        document.getElementById("lecturerDash").style.display = "block";
      }

      if(res.role == "ADVISOR"){
        document.getElementById("advisorDash").style.display = "block";
      }

    } else {
      document.getElementById("msg").innerHTML = "LOGIN FAILED";
    }

  })
  .catch(err => {
    console.log(err);
    document.getElementById("msg").innerHTML = "SERVER ERROR";
  });

}

</script>

</body>
</html>
